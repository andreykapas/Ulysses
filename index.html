<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title></title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1 class="site-title" data-i18n="siteTitle"></h1>
      <h2 data-i18n="subtitle"></h2>
      <p class="site-tagline" data-i18n="tagline"></p>

      <div class="site-nav-panel">
        <input
          type="checkbox"
          id="nav-toggle"
          class="nav-toggle visually-hidden"
        />
        <label
          for="nav-toggle"
          id="nav-burger"
          class="nav-burger"
          aria-label=""
        >
          <span class="nav-burger__bar"></span>
          <span class="nav-burger__bar"></span>
          <span class="nav-burger__bar"></span>
        </label>

        <nav id="site-nav" class="site-nav" aria-label="">
          <a
            href="#home"
            data-section="home"
            data-i18n="navHome"
            class="active"
          ></a>
          <a href="#kayuta" data-section="kayuta" data-i18n="navKayuta"></a>
          <a href="#rubka" data-section="rubka" data-i18n="navRubka"></a>
          <a href="#bereg" data-section="bereg" data-i18n="navBereg"></a>
        </nav>
      </div>

      <div class="lang-switch">
        <button type="button" data-lang="ru" class="active">RU</button>
        <button type="button" data-lang="en">EN</button>
      </div>
    </header>

    <main class="site-main">
      <section id="home" class="section">
        <h2 data-i18n="sectionHome"></h2>
        <div id="home-content"></div>
        <div id="home-pager" class="page-pager"></div>
      </section>

      <section id="kayuta" class="section" hidden>
        <h2 data-i18n="sectionKayuta"></h2>
        <nav class="kayuta-nav" aria-label="">
          <a href="#lyrics" data-kayuta="lyrics" data-i18n="kayutaLyrics"></a>
          <a href="#tech" data-kayuta="tech" data-i18n="kayutaTech"></a>
          <a
            href="#philosophy"
            data-kayuta="philosophy"
            data-i18n="kayutaPhilosophy"
          ></a>
        </nav>
        <nav class="kayuta-tech-nav" hidden aria-label="">
          <a
            href="#tech-code"
            data-kayuta-tech="tech-code"
            data-i18n="kayutaTechCode"
          ></a>
          <a
            href="#tech-marine"
            data-kayuta-tech="tech-marine"
            data-i18n="kayutaTechMarine"
          ></a>
        </nav>
        <div id="kayuta-content"></div>
        <div id="kayuta-pager"></div>
      </section>

      <section id="rubka" class="section" hidden>
        <h2 data-i18n="sectionRubka"></h2>
        <nav class="rubka-nav" aria-label="">
          <a href="#log" data-rubka="log" data-i18n="rubkaLog"></a>
          <a href="#daily" data-rubka="daily" data-i18n="rubkaDaily"></a>
        </nav>
        <div id="rubka-content"></div>
      </section>

      <section id="bereg" class="section" hidden>
        <h2 data-i18n="sectionBereg"></h2>
        <nav class="bereg-nav" aria-label="">
          <a href="#o-sebe" data-bereg="o-sebe" data-i18n="beregOSebe"></a>
          <a
            href="#brat-maksim"
            data-bereg="brat-maksim"
            data-i18n="beregBratMaksim"
          ></a>
        </nav>
        <div id="bereg-content"></div>
      </section>

      <section id="loki" class="section section--loki" hidden>
        <p class="loki-room__beacon" aria-hidden="true"></p>
        <div id="loki-content"></div>
        <div id="loki-pager"></div>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="site-social" aria-label=""></nav>
      <p data-i18n="footer"></p>
      <p
        class="site-motto"
        data-i18n="footerMotto"
        data-i18n-title="footerMottoHint"
      ></p>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
